# ChatGPT Codex — reasoning models via ChatGPT Pro/Plus subscription.
# Uses Responses API at https://chatgpt.com/backend-api/codex/responses
# Usage: devagent --provider chatgpt --model <model_name> "query"

provider = "chatgpt"

[gpt-5-codex]
context_window = 192000
use_responses_api = true
supports_temperature = false
default_max_tokens = 16384
input_price_per_million = 1.25
output_price_per_million = 10

