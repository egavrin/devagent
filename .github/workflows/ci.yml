name: CI

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'package.json'
      - 'turbo.json'
      - 'tsconfig.json'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'package.json'
      - 'turbo.json'
      - 'tsconfig.json'
      - '.github/workflows/ci.yml'

jobs:
  check:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx turbo run typecheck

      - name: Test
        run: bunx turbo run test --output-logs=new-only --log-order=stream --continue

      - name: Debug failed tests
        if: failure()
        run: |
          for pkg in core engine cli tools providers arkts; do
            echo "=== Running @devagent/$pkg tests directly ==="
            cd packages/$pkg && bun run test 2>&1 || true
            cd ../..
          done

      - name: Build
        run: bunx turbo run build
