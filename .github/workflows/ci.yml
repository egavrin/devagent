name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: devagent

      - uses: actions/checkout@v4
        with:
          repository: egavrin/devagent-sdk
          ref: 0e2cc5bf8e6a3780dd49a9362c5c4fac3629709c
          path: devagent-sdk

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install SDK dependencies
        working-directory: devagent-sdk
        run: bun install

      - name: Build SDK packages
        working-directory: devagent-sdk
        run: bun run build

      - name: Install dependencies
        working-directory: devagent
        run: bun install

      - name: Workspace hygiene
        working-directory: devagent
        run: bun run check:workspace

      - name: Lint
        working-directory: devagent
        run: bun run lint

      - name: Typecheck
        working-directory: devagent
        run: bun run typecheck

      - name: Dead code
        working-directory: devagent
        run: bun run check:dead

      - name: Dependency boundaries
        working-directory: devagent
        run: bun run check:deps

      - name: Test
        working-directory: devagent
        run: bun run test

      - name: Surface smoke
        working-directory: devagent
        run: bun run test:surface-smoke

      - name: OSS readiness
        working-directory: devagent
        run: bun run check:oss

      - name: Bundle
        working-directory: devagent
        run: bun run bundle

      - name: Publish package shape
        working-directory: devagent
        run: bun run check:publint

  bundle-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: devagent

      - uses: actions/checkout@v4
        with:
          repository: egavrin/devagent-sdk
          ref: 0e2cc5bf8e6a3780dd49a9362c5c4fac3629709c
          path: devagent-sdk

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install SDK dependencies
        working-directory: devagent-sdk
        run: bun install

      - name: Build SDK packages
        working-directory: devagent-sdk
        run: bun run build

      - name: Install dependencies
        working-directory: devagent
        run: bun install

      - name: Verify publish bundle
        working-directory: devagent
        run: bun run verify:publish
